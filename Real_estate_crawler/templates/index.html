<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부동산 매물 가격 분석기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        input::placeholder { font-size: 0.8rem; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-900 mb-2">🏠 실시간 부동산 매물 분석기 (네이버 크롤링)</h1>
            <p class="text-gray-500">네이버 부동산에서 실시간으로 매물을 검색하세요.</p>
        </header>

        <!-- 상세 검색 필터 섹션 -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-8 border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                
                <!-- 1. 지역 선택 -->
                <div class="space-y-1 lg:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700">지역 입력 (시/구/동)</label>
                    <div class="flex gap-2">
                        <input type="text" id="city" placeholder="시 (예: 서울)" class="w-1/3 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        <input type="text" id="district" placeholder="구 (예: 강남구)" class="w-1/3 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        <input type="text" id="dong" placeholder="동 (예: 개포동)" class="w-1/3 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>
                </div>

                <!-- 2. 매물 종류 -->
                <div class="space-y-1">
                    <label class="block text-sm font-semibold text-gray-700">매물 종류</label>
                    <select id="propertyType" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        <option value="APT">아파트</option>
                        <option value="VILLA">빌라/연립</option>
                    </select>
                </div>

                <!-- 3. 거래 유형 -->
                <div class="space-y-1">
                    <label class="block text-sm font-semibold text-gray-700">거래 유형</label>
                    <select id="tradeType" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        <option value="all">전체보기</option>
                        <option value="sale">매매</option>
                        <option value="jeonse">전세</option>
                        <option value="monthly">월세</option>
                    </select>
                </div>

                <!-- 4. 가격 범위 -->
                <div class="space-y-1 lg:col-span-1">
                    <label class="block text-sm font-semibold text-gray-700">가격 범위 (억 단위)</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="minPrice" placeholder="최소" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        <span class="text-gray-400">~</span>
                        <input type="number" id="maxPrice" placeholder="최대" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>
                </div>

                <!-- 검색 버튼 -->
                <div class="flex items-end lg:col-span-1">
                    <button onclick="fetchData()" id="searchBtn"
                            class="w-full px-6 py-2 bg-blue-700 text-white font-bold rounded-lg hover:bg-blue-800 transition shadow-md">
                        네이버 검색 실행
                    </button>
                </div>
            </div>
        </div>

        <!-- 로딩 표시 -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4 border-t-blue-500"></div>
            <p class="text-gray-500 font-medium">네이버 부동산에서 데이터를 수집 중입니다...<br><span class="text-xs text-gray-400">첫 검색은 2-3분 소요될 수 있습니다</span></p>
        </div>

        <!-- 결과 섹션 -->
        <div id="results" class="hidden space-y-6">
            <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border-l-8 border-blue-600">
                <div>
                    <h2 id="locationInfo" class="text-lg font-bold text-gray-800">지역 결과</h2>
                    <p id="filterSummary" class="text-xs text-gray-500 mt-1"></p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="downloadExcel()" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white text-sm font-bold px-4 py-2 rounded-lg transition shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        Excel 추출
                    </button>
                    <span id="resultCount" class="inline-block bg-blue-600 text-white text-sm font-bold px-4 py-2 rounded-lg">0건 발견</span>
                </div>
            </div>

            <div class="overflow-hidden bg-white rounded-2xl shadow-xl">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-100">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">매물명</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">거래 유형</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">가격</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">정보</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase tracking-wider">설명</th>
                        </tr>
                    </thead>
                    <tbody id="articleList" class="divide-y divide-gray-100">
                        <!-- 데이터 삽입 영역 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="emptyMsg" class="hidden mt-10 text-center py-20 bg-white rounded-2xl shadow-inner border-2 border-dashed border-gray-200">
            <p class="text-gray-400 text-lg">조건에 맞는 매물이 없습니다.<br><span class="text-sm">검색어나 가격 범위를 조정해보세요.</span></p>
        </div>

        <div id="errorMsg" class="hidden mt-10 p-6 bg-red-50 rounded-2xl shadow-sm border-l-8 border-red-500">
            <h3 class="text-red-800 font-bold mb-2">오류가 발생했습니다</h3>
            <p id="errorContent" class="text-red-600 text-sm"></p>
        </div>
    </div>

    <script>
        let lastFetchedData = [];

        function parsePriceToNumber(priceStr) {
            if (!priceStr) return 0;
            let total = 0;
            const eokMatch = priceStr.match(/(\d+)억/);
            const manMatch = priceStr.match(/억\s*([\d,]+)/) || priceStr.match(/^([\d,]+)/);
            
            if (eokMatch) total += parseInt(eokMatch[1]);
            if (manMatch) {
                const manValue = parseInt(manMatch[1].replace(/,/g, ''));
                total += manValue / 10000;
            }
            return total;
        }

        // CSV 다운로드 기능 구현
        function downloadExcel() {
            if (lastFetchedData.length === 0) return;

            // CSV 헤더
            let csvContent = "\uFEFF"; // 한글 깨짐 방지 BOM
            csvContent += "매물명,매물종류,거래유형,가격,정보,설명\n";

            // 데이터 행 추가
            lastFetchedData.forEach(item => {
                const row = [
                    item.name || "",
                    item.type || "",
                    item.trade_type || "",
                    item.price || "",
                    item.info || "",
                    `"${(item.description || "").replace(/"/g, '""')}"` // 큰따옴표 처리
                ].join(",");
                csvContent += row + "\n";
            });

            // 파일 생성 및 다운로드
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            const fileName = `부동산매물_${new Date().toLocaleDateString()}.csv`;
            
            link.setAttribute("href", url);
            link.setAttribute("download", fileName);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function fetchData() {
            const city = document.getElementById('city').value.trim();
            const district = document.getElementById('district').value.trim();
            const dong = document.getElementById('dong').value.trim();
            const propertyType = document.getElementById('propertyType').value;
            const tradeType = document.getElementById('tradeType').value;
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;

            if (!city || !district) {
                alert('최소 시, 구 정보는 입력하셔야 합니다.');
                return;
            }

            const searchBtn = document.getElementById('searchBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const emptyMsg = document.getElementById('emptyMsg');
            const errorMsg = document.getElementById('errorMsg');
            const articleList = document.getElementById('articleList');

            searchBtn.disabled = true;
            loading.classList.remove('hidden');
            results.classList.add('hidden');
            emptyMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');
            articleList.innerHTML = '';

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        city: city,
                        district: district,
                        dong: dong,
                        propertyTypes: [propertyType],
                        tradeType: tradeType,
                        minPrice: minPrice ? parseFloat(minPrice) : null,
                        maxPrice: maxPrice ? parseFloat(maxPrice) : null
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || '검색 중 오류가 발생했습니다');
                }

                if (result.success && result.data.length > 0) {
                    lastFetchedData = result.data;

                    document.getElementById('locationInfo').innerText = `${city} ${district} ${dong} 검색 결과`;
                    document.getElementById('filterSummary').innerText = `${propertyType === 'APT' ? '아파트' : '빌라/연립'} | ${tradeType === 'all' ? '전체거래' : tradeType}`;
                    document.getElementById('resultCount').innerText = `${result.data.length}건 발견`;

                    result.data.forEach(item => {
                        const tradeColor = item.trade_type.includes('매매') ? 'text-red-600 bg-red-50' : 
                                          item.trade_type.includes('전세') ? 'text-green-600 bg-green-50' : 'text-blue-600 bg-blue-50';
                        
                        const row = `
                            <tr class="hover:bg-blue-50/30 transition">
                                <td class="px-6 py-5">
                                    <p class="font-bold text-gray-900 text-sm">${item.name || '정보 없음'}</p>
                                </td>
                                <td class="px-6 py-5 text-center">
                                    <span class="px-3 py-1 text-xs font-bold rounded-full ${tradeColor}">
                                        ${item.trade_type || '알 수 없음'}
                                    </span>
                                </td>
                                <td class="px-6 py-5">
                                    <span class="text-lg font-extrabold text-blue-800">${item.price || '정보 없음'}</span>
                                </td>
                                <td class="px-6 py-5">
                                    <p class="text-xs text-gray-600">${item.info || '정보 없음'}</p>
                                </td>
                                <td class="px-6 py-5">
                                    <p class="text-sm text-gray-600 leading-relaxed">${item.description || ''}</p>
                                </td>
                            </tr>
                        `;
                        articleList.innerHTML += row;
                    });

                    results.classList.remove('hidden');
                } else if (result.success) {
                    emptyMsg.classList.remove('hidden');
                } else {
                    throw new Error(result.error || '검색 중 오류가 발생했습니다');
                }
            } catch (error) {
                console.error('검색 오류:', error);
                errorMsg.classList.remove('hidden');
                document.getElementById('errorContent').innerText = error.message || '검색 중 오류가 발생했습니다';
            } finally {
                loading.classList.add('hidden');
                searchBtn.disabled = false;
            }
        }

        // 엔터키로 검색
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('#city, #district, #dong, #minPrice, #maxPrice');
            inputs.forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        fetchData();
                    }
                });
            });
        });
    </script>
</body>
</html>
