<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>완성형 웹 장기 (Web Janggi)</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        h1 { margin: 10px 0; color: #333; }
        
        /* 게임 정보 패널 */
        .game-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            align-items: center;
        }
        .status-box {
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 1.1rem;
            font-weight: bold;
        }
        #turn-indicator { color: #008d62; }
        
        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #5d4037;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #4e342e; }

        canvas {
            background-color: #e6c288;
            border: 4px solid #5d4037;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        
        .instructions {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>웹 장기 (Web Janggi)</h1>
    
    <div class="game-panel">
        <div class="status-box">차례: <span id="turn-indicator">초(楚)</span></div>
        <button onclick="resetGame()">게임 재시작</button>
    </div>
    
    <canvas id="janggiBoard" width="450" height="500"></canvas>
    
    <div class="instructions">
        기물 클릭: 선택 / 빈 곳 클릭: 이동<br>
        <span style="color: #d32f2f;">* 장군(Check) 기능과 포(包)의 이동 규칙이 적용되어 있습니다.</span>
    </div>

    <script>
        const canvas = document.getElementById('janggiBoard');
        const ctx = canvas.getContext('2d');
        const turnText = document.getElementById('turn-indicator');

        // --- 1. 설정 및 상수 ---
        const ROWS = 10;
        const COLS = 9;
        const CELL_W = 50;
        const CELL_H = 50;
        const MARGIN_X = 25;
        const MARGIN_Y = 25;

        const TEAM_CHO = 1; // 초(파랑/초록) - 선수
        const TEAM_HAN = 2; // 한(빨강) - 후수

        const PIECES = {
            CHA: '차', PO: '포', MA: '마', SANG: '상', SA: '사', JANG: '장', JOL: '졸', BYUNG: '병'
        };

        // 게임 상태 변수
        let turn = TEAM_CHO;
        let selectedPiece = null;
        let board = [];
        let validMoves = [];
        let gameOver = false;

        // --- 2. 초기화 및 그리기 ---

        function initBoard() {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
            gameOver = false;
            turn = TEAM_CHO;
            selectedPiece = null;
            validMoves = [];
            updateStatus();

            const place = (r, c, team, type) => { board[r][c] = { team, type }; };

            // 상차림 (마상마상)
            const setupRow = (row, team) => {
                place(row, 0, team, PIECES.CHA); place(row, 8, team, PIECES.CHA);
                place(row, 1, team, PIECES.MA);  place(row, 7, team, PIECES.MA);
                place(row, 2, team, PIECES.SANG); place(row, 6, team, PIECES.SANG);
                place(row, 3, team, PIECES.SA);  place(row, 5, team, PIECES.SA);
            };

            setupRow(0, TEAM_CHO);
            setupRow(9, TEAM_HAN);

            // 왕(장)
            place(1, 4, TEAM_CHO, PIECES.JANG);
            place(8, 4, TEAM_HAN, PIECES.JANG);

            // 포
            place(2, 1, TEAM_CHO, PIECES.PO); place(2, 7, TEAM_CHO, PIECES.PO);
            place(7, 1, TEAM_HAN, PIECES.PO); place(7, 7, TEAM_HAN, PIECES.PO);

            // 졸/병
            for(let c=0; c<COLS; c+=2) {
                place(3, c, TEAM_CHO, PIECES.JOL);
                place(6, c, TEAM_HAN, PIECES.BYUNG);
            }
            drawBoard();
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 격자
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#333';
            for (let r = 0; r < ROWS; r++) {
                ctx.beginPath();
                ctx.moveTo(MARGIN_X, MARGIN_Y + r * CELL_H);
                ctx.lineTo(MARGIN_X + (COLS - 1) * CELL_W, MARGIN_Y + r * CELL_H);
                ctx.stroke();
            }
            for (let c = 0; c < COLS; c++) {
                ctx.beginPath();
                ctx.moveTo(MARGIN_X + c * CELL_W, MARGIN_Y);
                ctx.lineTo(MARGIN_X + c * CELL_W, MARGIN_Y + (ROWS - 1) * CELL_H);
                ctx.stroke();
            }

            // 궁성 X 표시
            drawPalace(0, 3);
            drawPalace(7, 3);

            // 이동 가능 경로 (힌트)
            if (selectedPiece) {
                ctx.fillStyle = 'rgba(100, 255, 100, 0.5)';
                validMoves.forEach(m => {
                    ctx.beginPath();
                    ctx.arc(MARGIN_X + m.c * CELL_W, MARGIN_Y + m.r * CELL_H, 10, 0, Math.PI*2);
                    ctx.fill();
                });
            }

            // 기물 그리기
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) drawPiece(r, c, board[r][c]);
                }
            }
        }

        function drawPalace(startRow, startCol) {
            const x = MARGIN_X + startCol * CELL_W;
            const y = MARGIN_Y + startRow * CELL_H;
            ctx.beginPath();
            ctx.moveTo(x, y); ctx.lineTo(x + 2*CELL_W, y + 2*CELL_H);
            ctx.moveTo(x + 2*CELL_W, y); ctx.lineTo(x, y + 2*CELL_H);
            ctx.stroke();
        }

        function drawPiece(r, c, piece) {
            const x = MARGIN_X + c * CELL_W;
            const y = MARGIN_Y + r * CELL_H;
            const isJang = piece.type === PIECES.JANG;

            ctx.beginPath();
            ctx.arc(x, y, isJang ? 22 : 18, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; // 기물 배경색
            ctx.fill();
            
            const color = (piece.team === TEAM_CHO) ? '#008d62' : '#d32f2f'; // 초:녹색, 한:적색
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // 선택된 기물 강조
            if (selectedPiece && selectedPiece.r === r && selectedPiece.c === c) {
                ctx.strokeStyle = '#29b6f6'; // 선택 색상 (하늘색)
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            ctx.fillStyle = color;
            ctx.font = isJang ? 'bold 26px serif' : 'bold 20px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(piece.type, x, y + 3);
        }

        // --- 3. 이동 로직 (핵심) ---

        function getValidMoves(r, c, piece) {
            let moves = [];
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];

            // 1. 차(車)
            if (piece.type === PIECES.CHA) {
                directions.forEach(d => {
                    let nr = r + d[0], nc = c + d[1];
                    while (isInBoard(nr, nc)) {
                        if (board[nr][nc]) {
                            if (board[nr][nc].team !== piece.team) moves.push({r: nr, c: nc});
                            break;
                        }
                        moves.push({r: nr, c: nc});
                        nr += d[0]; nc += d[1];
                    }
                });
                // 궁성 내 대각선 이동 (차는 궁성 선을 탈 수 있음)
                addPalaceMoves(moves, r, c, piece.team, true); 
            }

            // 2. 졸(卒)/병(兵)
            else if (piece.type === PIECES.JOL || piece.type === PIECES.BYUNG) {
                const forward = (piece.team === TEAM_CHO) ? 1 : -1;
                [[forward, 0], [0, -1], [0, 1]].forEach(d => {
                    const nr = r + d[0], nc = c + d[1];
                    if (isInBoard(nr, nc) && (!board[nr][nc] || board[nr][nc].team !== piece.team)) {
                        moves.push({r: nr, c: nc});
                    }
                });
                // 궁성 안에서 대각선 전진 가능
                addPalaceMoves(moves, r, c, piece.team, false, true);
            }

            // 3. 마(馬)
            else if (piece.type === PIECES.MA) {
                const maMoves = [
                    [-1,0,-2,-1], [-1,0,-2,1], [1,0,2,-1], [1,0,2,1],
                    [0,-1,-1,-2], [0,-1,1,-2], [0,1,-1,2], [0,1,1,2]
                ];
                maMoves.forEach(m => {
                    const mr=r+m[0], mc=c+m[1], tr=r+m[2], tc=c+m[3];
                    if (isInBoard(tr, tc) && !board[mr][mc]) {
                        if (!board[tr][tc] || board[tr][tc].team !== piece.team) moves.push({r: tr, c: tc});
                    }
                });
            }

            // 4. 상(象)
            else if (piece.type === PIECES.SANG) {
                const sangMoves = [
                    [-1,0,-2,-1,-3,-2], [-1,0,-2,1,-3,2], [1,0,2,-1,3,-2], [1,0,2,1,3,2],
                    [0,-1,-1,-2,-2,-3], [0,-1,1,-2,2,-3], [0,1,-1,2,-2,3], [0,1,1,2,2,3]
                ];
                sangMoves.forEach(m => {
                    const m1r=r+m[0], m1c=c+m[1], m2r=r+m[2], m2c=c+m[3], tr=r+m[4], tc=c+m[5];
                    if (isInBoard(tr, tc)) {
                        if (!board[m1r][m1c] && !board[m2r][m2c]) {
                            if (!board[tr][tc] || board[tr][tc].team !== piece.team) moves.push({r: tr, c: tc});
                        }
                    }
                });
            }

            // 5. 사(士), 장(將)
            else if (piece.type === PIECES.SA || piece.type === PIECES.JANG) {
                // 궁성 내 직선 1칸
                directions.forEach(d => {
                    const nr = r + d[0], nc = c + d[1];
                    if (isInPalace(nr, nc, piece.team)) {
                        if (!board[nr][nc] || board[nr][nc].team !== piece.team) moves.push({r: nr, c: nc});
                    }
                });
                // 궁성 내 대각선 1칸
                addPalaceMoves(moves, r, c, piece.team, false);
            }

            // 6. 포(包) - [고급 룰 적용]
            else if (piece.type === PIECES.PO) {
                directions.forEach(d => {
                    let nr = r + d[0], nc = c + d[1];
                    let jump = false;
                    while (isInBoard(nr, nc)) {
                        if (board[nr][nc]) {
                            if (!jump) {
                                // 첫 장애물: 포면 못 넘음
                                if (board[nr][nc].type === PIECES.PO) break;
                                jump = true;
                            } else {
                                // 두번째 장애물: 적이고 포가 아니면 잡음
                                if (board[nr][nc].team !== piece.team && board[nr][nc].type !== PIECES.PO) {
                                    moves.push({r: nr, c: nc});
                                }
                                break;
                            }
                        } else {
                            if (jump) moves.push({r: nr, c: nc});
                        }
                        nr += d[0]; nc += d[1];
                    }
                });
                // 궁성 포 대각선 (다리 필요) - 복잡하므로 여기선 제외하거나 직선과 동일 로직 적용 필요
                // (이 버전에서는 포의 궁성 대각선 이동은 생략하고 직선 위주로 처리합니다)
            }

            return moves;
        }

        // 궁성 내 대각선 이동 처리 헬퍼
        function addPalaceMoves(moves, r, c, team, isLong = false, isPawn = false) {
            // 궁성 좌표 정의
            const palace = (team === TEAM_CHO) ? 
                { rMin: 0, rMax: 2, cMin: 3, cMax: 5, center: {r:1, c:4} } : 
                { rMin: 7, rMax: 9, cMin: 3, cMax: 5, center: {r:8, c:4} };

            // 현재 위치가 궁성 안인지 확인
            if (r < palace.rMin || r > palace.rMax || c < palace.cMin || c > palace.cMax) return;

            const diags = [[-1,-1], [-1,1], [1,-1], [1,1]];

            diags.forEach(d => {
                const nr = r + d[0], nc = c + d[1];
                
                // 졸은 뒤로 못 감 (대각선도 후퇴 불가)
                if (isPawn) {
                    if (team === TEAM_CHO && d[0] < 0) return; // 초졸은 위로 못감
                    if (team === TEAM_HAN && d[0] > 0) return; // 한병은 아래로 못감
                }

                // 이동할 곳이 궁성 안이어야 함
                if (nr >= palace.rMin && nr <= palace.rMax && nc >= palace.cMin && nc <= palace.cMax) {
                    // 대각선 길 위에 있는지 확인 (중심을 거치거나 중심이어야 함)
                    const onPath = (r === palace.center.r && c === palace.center.c) || 
                                   (nr === palace.center.r && nc === palace.center.c);
                    
                    if (onPath) {
                        // 기본 1칸 이동
                        if (!board[nr][nc] || board[nr][nc].team !== team) {
                            moves.push({r: nr, c: nc});
                        }
                        // 차(車)의 경우 끝까지 감
                        if (isLong && !board[nr][nc] && onPath) {
                            const nnr = nr + d[0], nnc = nc + d[1];
                            if (nnr >= palace.rMin && nnr <= palace.rMax && nnc >= palace.cMin && nnc <= palace.cMax) {
                                if (!board[nnr][nnc] || board[nnr][nnc].team !== team) {
                                    moves.push({r: nnr, c: nnc});
                                }
                            }
                        }
                    }
                }
            });
        }

        function isInBoard(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }
        
        function isInPalace(r, c, team) {
            if (c < 3 || c > 5) return false;
            if (team === TEAM_CHO) return r >= 0 && r <= 2;
            if (team === TEAM_HAN) return r >= 7 && r <= 9;
            return false;
        }

        // --- 4. 장군 체크 및 유틸 ---

        function isCheck(targetTeam) {
            // 왕의 위치 찾기
            let kR = -1, kC = -1;
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if (board[r][c] && board[r][c].team === targetTeam && board[r][c].type === PIECES.JANG) {
                        kR = r; kC = c; break;
                    }
                }
            }
            if (kR === -1) return false; // 왕이 없음 (이미 끝난 게임)

            // 상대 팀 구하기
            const enemyTeam = (targetTeam === TEAM_CHO) ? TEAM_HAN : TEAM_CHO;

            // 적의 모든 기물이 왕을 칠 수 있는지 확인
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    const p = board[r][c];
                    if (p && p.team === enemyTeam) {
                        const moves = getValidMoves(r, c, p);
                        for (let m of moves) {
                            if (m.r === kR && m.c === kC) return true;
                        }
                    }
                }
            }
            return false;
        }

        function updateStatus() {
            if (turn === TEAM_CHO) {
                turnText.textContent = "초(楚) - 초록색";
                turnText.style.color = "#008d62";
            } else {
                turnText.textContent = "한(漢) - 빨강색";
                turnText.style.color = "#d32f2f";
            }
        }

        function resetGame() {
            initBoard();
        }

        // --- 5. 이벤트 핸들러 ---

        canvas.addEventListener('click', (e) => {
            if (gameOver) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - MARGIN_X + CELL_W/2;
            const y = e.clientY - rect.top - MARGIN_Y + CELL_H/2;
            const c = Math.floor(x / CELL_W);
            const r = Math.floor(y / CELL_H);

            if (!isInBoard(r, c)) return;

            // 내 기물 선택
            if (board[r][c] && board[r][c].team === turn) {
                selectedPiece = { r, c };
                validMoves = getValidMoves(r, c, board[r][c]);
                drawBoard();
                return;
            }

            // 이동 시도
            if (selectedPiece) {
                const move = validMoves.find(m => m.r === r && m.c === c);
                if (move) {
                    const target = board[r][c];
                    
                    // 왕 잡음 -> 게임 종료
                    if (target && target.type === PIECES.JANG) {
                        board[r][c] = board[selectedPiece.r][selectedPiece.c];
                        board[selectedPiece.r][selectedPiece.c] = null;
                        drawBoard();
                        setTimeout(() => {
                            alert((turn === TEAM_CHO ? "초(楚)" : "한(漢)") + " 승리!");
                            gameOver = true;
                        }, 10);
                        return;
                    }

                    // 이동 실행
                    board[r][c] = board[selectedPiece.r][selectedPiece.c];
                    board[selectedPiece.r][selectedPiece.c] = null;
                    
                    // 턴 넘기기
                    turn = (turn === TEAM_CHO) ? TEAM_HAN : TEAM_CHO;
                    selectedPiece = null;
                    validMoves = [];
                    updateStatus();
                    
                    // 장군 체크 (이동 후 상대 왕이 위협받는지)
                    if (isCheck(turn)) {
                        setTimeout(() => alert("장군!!"), 50);
                    }
                    
                    drawBoard();
                } else {
                    // 잘못된 위치 클릭 -> 선택 해제
                    selectedPiece = null;
                    validMoves = [];
                    drawBoard();
                }
            }
        });

        // 시작
        initBoard();

    </script>
</body>
</html>
