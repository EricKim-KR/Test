<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>완성형 웹 장기 (Web Janggi)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');

        body {
            font-family: 'Noto Serif KR', serif;
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        h1 {
            margin: 20px 0;
            color: #ecf0f1;
            font-size: 2.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        /* 게임 정보 패널 */
        .game-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            align-items: center;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .status-box {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ecf0f1;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        }

        #turn-indicator {
            transition: color 0.3s ease;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            font-family: 'Noto Serif KR', serif;
            background: linear-gradient(145deg, #5d4037, #4e342e);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        canvas {
            background-color: #deb887;
            /* Fallback */
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            transition: box-shadow 0.3s ease;
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h1>웹 장기 (Web Janggi)</h1>

    <div class="game-panel">
        <div class="status-box">차례: <span id="turn-indicator">초(楚)</span></div>
        <button onclick="resetGame()">게임 재시작</button>
    </div>

    <canvas id="janggiBoard" width="450" height="500"></canvas>

    <div class="instructions">
        기물 클릭: 선택 / 빈 곳 클릭: 이동<br>
        <span style="color: #d32f2f;">* 장군(Check) 기능과 포(包)의 이동 규칙이 적용되어 있습니다.</span>
    </div>

    <script>
        const canvas = document.getElementById('janggiBoard');
        const ctx = canvas.getContext('2d');
        const turnText = document.getElementById('turn-indicator');

        // --- 1. 설정 및 상수 ---
        const ROWS = 10;
        const COLS = 9;
        const CELL_W = 50;
        const CELL_H = 50;
        const MARGIN_X = 25;
        const MARGIN_Y = 25;

        const TEAM_CHO = 1; // 초(파랑/초록) - 선수
        const TEAM_HAN = 2; // 한(빨강) - 후수

        const PIECES = {
            CHA: '차', PO: '포', MA: '마', SANG: '상', SA: '사', JANG: '장', JOL: '졸', BYUNG: '병'
        };

        // 게임 상태 변수
        let turn = TEAM_CHO;
        let selectedPiece = null;
        let board = [];
        let validMoves = [];
        let gameOver = false;
        let isAnimating = false;

        // --- 2. 초기화 및 그리기 ---

        function initBoard() {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
            gameOver = false;
            turn = TEAM_CHO;
            selectedPiece = null;
            validMoves = [];
            updateStatus();

            const place = (r, c, team, type) => { board[r][c] = { team, type }; };

            // 상차림 (마상마상)
            const setupRow = (row, team) => {
                place(row, 0, team, PIECES.CHA); place(row, 8, team, PIECES.CHA);
                place(row, 1, team, PIECES.MA); place(row, 7, team, PIECES.MA);
                place(row, 2, team, PIECES.SANG); place(row, 6, team, PIECES.SANG);
                place(row, 3, team, PIECES.SA); place(row, 5, team, PIECES.SA);
            };

            setupRow(0, TEAM_CHO);
            setupRow(9, TEAM_HAN);

            // 왕(장)
            place(1, 4, TEAM_CHO, PIECES.JANG);
            place(8, 4, TEAM_HAN, PIECES.JANG);

            // 포
            place(2, 1, TEAM_CHO, PIECES.PO); place(2, 7, TEAM_CHO, PIECES.PO);
            place(7, 1, TEAM_HAN, PIECES.PO); place(7, 7, TEAM_HAN, PIECES.PO);

            // 졸/병
            for (let c = 0; c < COLS; c += 2) {
                place(3, c, TEAM_CHO, PIECES.JOL);
                place(6, c, TEAM_HAN, PIECES.BYUNG);
            }
            drawBoard();
        }

        function drawBoard() {
            // 보드 배경 (나무 질감 그라디언트)
            const bgGrad = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 50,
                canvas.width / 2, canvas.height / 2, 350
            );
            bgGrad.addColorStop(0, '#e6c288');
            bgGrad.addColorStop(1, '#b08d55');

            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 격자 그리기
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#4e342e'; // 진한 갈색

            // 그림자 효과로 깊이감 추가
            ctx.shadowBlur = 1;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
            ctx.shadowOffsetY = 1;

            const drawGridLine = (x1, y1, x2, y2) => {
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            };

            for (let r = 0; r < ROWS; r++) {
                drawGridLine(MARGIN_X, MARGIN_Y + r * CELL_H, MARGIN_X + (COLS - 1) * CELL_W, MARGIN_Y + r * CELL_H);
            }
            for (let c = 0; c < COLS; c++) {
                drawGridLine(MARGIN_X + c * CELL_W, MARGIN_Y, MARGIN_X + c * CELL_W, MARGIN_Y + (ROWS - 1) * CELL_H);
            }

            ctx.shadowColor = 'transparent'; // 그림자 초기화

            // 궁성 X 표시
            drawPalace(0, 3);
            drawPalace(7, 3);

            // 이동 가능 경로 (힌트) - 세련된 점으로 변경
            if (selectedPiece) {
                ctx.fillStyle = 'rgba(41, 182, 246, 0.6)'; // 밝은 하늘색
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#29b6f6';

                validMoves.forEach(m => {
                    const x = MARGIN_X + m.c * CELL_W;
                    const y = MARGIN_Y + m.r * CELL_H;

                    ctx.beginPath();
                    // 타겟에 적이 있으면 조금 더 크게 표시
                    const target = board[m.r][m.c];
                    const radius = target ? 12 : 8;

                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;
            }

            // 기물 그리기
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) drawPiece(r, c, board[r][c]);
                }
            }
        }

        function drawPalace(startRow, startCol) {
            const x = MARGIN_X + startCol * CELL_W;
            const y = MARGIN_Y + startRow * CELL_H;

            ctx.beginPath();
            ctx.strokeStyle = '#4e342e';
            ctx.lineWidth = 2;

            // X자
            ctx.moveTo(x, y);
            ctx.lineTo(x + 2 * CELL_W, y + 2 * CELL_H);
            ctx.moveTo(x + 2 * CELL_W, y);
            ctx.lineTo(x, y + 2 * CELL_H);
            ctx.stroke();

            // 궁성 장식 (네 귀퉁이) - 선택 사항
            const cornerSize = 10;
            const corners = [
                [x, y, 1, 1], [x + 2 * CELL_W, y, -1, 1],
                [x, y + 2 * CELL_H, 1, -1], [x + 2 * CELL_W, y + 2 * CELL_H, -1, -1]
            ];

            ctx.lineWidth = 3;
            corners.forEach(([cx, cy, dx, dy]) => {
                ctx.beginPath();
                ctx.moveTo(cx + dx * cornerSize, cy);
                ctx.lineTo(cx, cy);
                ctx.lineTo(cx, cy + dy * cornerSize);
                ctx.stroke();
            });
        }

        function drawPiece(r, c, piece, cx, cy) {
            const x = cx ?? (MARGIN_X + c * CELL_W);
            const y = cy ?? (MARGIN_Y + r * CELL_H);
            const isJang = piece.type === PIECES.JANG;
            const radius = isJang ? 22 : 19;

            // 1. 그림자
            ctx.beginPath();
            ctx.arc(x + 2, y + 3, radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fill();

            // 2. 기물 몸체 (3D 돌 느낌 그라디언트)
            const grad = ctx.createRadialGradient(
                x - 5, y - 5, 2,
                x, y, radius
            );
            grad.addColorStop(0, '#fdfbf7');
            grad.addColorStop(1, '#e0dcd0');

            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // 3. 테두리 (음각 효과)
            ctx.lineWidth = isJang ? 3 : 2;
            ctx.strokeStyle = '#d7ccc0'; // 밝은 안쪽 테두리
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(x, y, radius - (isJang ? 4 : 3), 0, Math.PI * 2);
            ctx.strokeStyle = '#9e9e9e'; // 내부 얇은 선
            ctx.lineWidth = 1;
            ctx.stroke();

            // 4. 선택됨 효과 (빛나는 테두리)
            if (selectedPiece && selectedPiece.r === r && selectedPiece.c === c) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(x, y, radius + 2, 0, Math.PI * 2);
                ctx.strokeStyle = '#29b6f6';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#29b6f6';
                ctx.shadowBlur = 15;
                ctx.stroke();
                ctx.restore();
            }

            // 5. 글자 (음각 느낌)
            const color = (piece.team === TEAM_CHO) ? '#00695c' : '#c62828'; // 더 깊은 초록/빨강
            ctx.fillStyle = color;
            ctx.font = isJang ? 'bold 28px "Noto Serif KR", serif' : 'bold 22px "Noto Serif KR", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 글자 미세 그림자 (음각 효과)
            ctx.shadowColor = 'rgba(255,255,255,0.8)';
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
            ctx.shadowBlur = 0;

            ctx.fillText(piece.type, x, y + 2);

            // 그림자 초기화
            ctx.shadowColor = 'transparent';
        }

        // --- 3. 이동 로직 (핵심) ---

        function getValidMoves(r, c, piece) {
            let moves = [];
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];

            // 1. 차(車)
            if (piece.type === PIECES.CHA) {
                directions.forEach(d => {
                    let nr = r + d[0], nc = c + d[1];
                    while (isInBoard(nr, nc)) {
                        if (board[nr][nc]) {
                            if (board[nr][nc].team !== piece.team) moves.push({ r: nr, c: nc });
                            break;
                        }
                        moves.push({ r: nr, c: nc });
                        nr += d[0]; nc += d[1];
                    }
                });
                // 궁성 내 대각선 이동 (차는 궁성 선을 탈 수 있음)
                addPalaceMoves(moves, r, c, piece.team, true);
            }

            // 2. 졸(卒)/병(兵)
            else if (piece.type === PIECES.JOL || piece.type === PIECES.BYUNG) {
                const forward = (piece.team === TEAM_CHO) ? 1 : -1;
                [[forward, 0], [0, -1], [0, 1]].forEach(d => {
                    const nr = r + d[0], nc = c + d[1];
                    if (isInBoard(nr, nc) && (!board[nr][nc] || board[nr][nc].team !== piece.team)) {
                        moves.push({ r: nr, c: nc });
                    }
                });
                // 궁성 안에서 대각선 전진 가능
                addPalaceMoves(moves, r, c, piece.team, false, true);
            }

            // 3. 마(馬)
            else if (piece.type === PIECES.MA) {
                const maMoves = [
                    [-1, 0, -2, -1], [-1, 0, -2, 1], [1, 0, 2, -1], [1, 0, 2, 1],
                    [0, -1, -1, -2], [0, -1, 1, -2], [0, 1, -1, 2], [0, 1, 1, 2]
                ];
                maMoves.forEach(m => {
                    const mr = r + m[0], mc = c + m[1], tr = r + m[2], tc = c + m[3];
                    if (isInBoard(tr, tc) && !board[mr][mc]) {
                        if (!board[tr][tc] || board[tr][tc].team !== piece.team) moves.push({ r: tr, c: tc });
                    }
                });
            }

            // 4. 상(象)
            else if (piece.type === PIECES.SANG) {
                const sangMoves = [
                    [-1, 0, -2, -1, -3, -2], [-1, 0, -2, 1, -3, 2], [1, 0, 2, -1, 3, -2], [1, 0, 2, 1, 3, 2],
                    [0, -1, -1, -2, -2, -3], [0, -1, 1, -2, 2, -3], [0, 1, -1, 2, -2, 3], [0, 1, 1, 2, 2, 3]
                ];
                sangMoves.forEach(m => {
                    const m1r = r + m[0], m1c = c + m[1], m2r = r + m[2], m2c = c + m[3], tr = r + m[4], tc = c + m[5];
                    if (isInBoard(tr, tc)) {
                        if (!board[m1r][m1c] && !board[m2r][m2c]) {
                            if (!board[tr][tc] || board[tr][tc].team !== piece.team) moves.push({ r: tr, c: tc });
                        }
                    }
                });
            }

            // 5. 사(士), 장(將)
            else if (piece.type === PIECES.SA || piece.type === PIECES.JANG) {
                // 궁성 내 직선 1칸
                directions.forEach(d => {
                    const nr = r + d[0], nc = c + d[1];
                    if (isInPalace(nr, nc, piece.team)) {
                        if (!board[nr][nc] || board[nr][nc].team !== piece.team) moves.push({ r: nr, c: nc });
                    }
                });
                // 궁성 내 대각선 1칸
                addPalaceMoves(moves, r, c, piece.team, false);
            }

            // 6. 포(包) - [고급 룰 적용]
            else if (piece.type === PIECES.PO) {
                directions.forEach(d => {
                    let nr = r + d[0], nc = c + d[1];
                    let jump = false;
                    while (isInBoard(nr, nc)) {
                        if (board[nr][nc]) {
                            if (!jump) {
                                // 첫 장애물: 포면 못 넘음
                                if (board[nr][nc].type === PIECES.PO) break;
                                jump = true;
                            } else {
                                // 두번째 장애물: 적이고 포가 아니면 잡음
                                if (board[nr][nc].team !== piece.team && board[nr][nc].type !== PIECES.PO) {
                                    moves.push({ r: nr, c: nc });
                                }
                                break;
                            }
                        } else {
                            if (jump) moves.push({ r: nr, c: nc });
                        }
                        nr += d[0]; nc += d[1];
                    }
                });
                // 궁성 포 대각선 (다리 필요) - 복잡하므로 여기선 제외하거나 직선과 동일 로직 적용 필요
                // (이 버전에서는 포의 궁성 대각선 이동은 생략하고 직선 위주로 처리합니다)
            }

            return moves;
        }

        // 궁성 내 대각선 이동 처리 헬퍼
        function addPalaceMoves(moves, r, c, team, isLong = false, isPawn = false) {
            // 궁성 좌표 정의
            const palace = (team === TEAM_CHO) ?
                { rMin: 0, rMax: 2, cMin: 3, cMax: 5, center: { r: 1, c: 4 } } :
                { rMin: 7, rMax: 9, cMin: 3, cMax: 5, center: { r: 8, c: 4 } };

            // 현재 위치가 궁성 안인지 확인
            if (r < palace.rMin || r > palace.rMax || c < palace.cMin || c > palace.cMax) return;

            const diags = [[-1, -1], [-1, 1], [1, -1], [1, 1]];

            diags.forEach(d => {
                const nr = r + d[0], nc = c + d[1];

                // 졸은 뒤로 못 감 (대각선도 후퇴 불가)
                if (isPawn) {
                    if (team === TEAM_CHO && d[0] < 0) return; // 초졸은 위로 못감
                    if (team === TEAM_HAN && d[0] > 0) return; // 한병은 아래로 못감
                }

                // 이동할 곳이 궁성 안이어야 함
                if (nr >= palace.rMin && nr <= palace.rMax && nc >= palace.cMin && nc <= palace.cMax) {
                    // 대각선 길 위에 있는지 확인 (중심을 거치거나 중심이어야 함)
                    const onPath = (r === palace.center.r && c === palace.center.c) ||
                        (nr === palace.center.r && nc === palace.center.c);

                    if (onPath) {
                        // 기본 1칸 이동
                        if (!board[nr][nc] || board[nr][nc].team !== team) {
                            moves.push({ r: nr, c: nc });
                        }
                        // 차(車)의 경우 끝까지 감
                        if (isLong && !board[nr][nc] && onPath) {
                            const nnr = nr + d[0], nnc = nc + d[1];
                            if (nnr >= palace.rMin && nnr <= palace.rMax && nnc >= palace.cMin && nnc <= palace.cMax) {
                                if (!board[nnr][nnc] || board[nnr][nnc].team !== team) {
                                    moves.push({ r: nnr, c: nnc });
                                }
                            }
                        }
                    }
                }
            });
        }

        function isInBoard(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

        function isInPalace(r, c, team) {
            if (c < 3 || c > 5) return false;
            if (team === TEAM_CHO) return r >= 0 && r <= 2;
            if (team === TEAM_HAN) return r >= 7 && r <= 9;
            return false;
        }

        // --- 4. 장군 체크 및 유틸 ---

        function isCheck(targetTeam) {
            // 왕의 위치 찾기
            let kR = -1, kC = -1;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c] && board[r][c].team === targetTeam && board[r][c].type === PIECES.JANG) {
                        kR = r; kC = c; break;
                    }
                }
            }
            if (kR === -1) return false; // 왕이 없음 (이미 끝난 게임)

            // 상대 팀 구하기
            const enemyTeam = (targetTeam === TEAM_CHO) ? TEAM_HAN : TEAM_CHO;

            // 적의 모든 기물이 왕을 칠 수 있는지 확인
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const p = board[r][c];
                    if (p && p.team === enemyTeam) {
                        const moves = getValidMoves(r, c, p);
                        for (let m of moves) {
                            if (m.r === kR && m.c === kC) return true;
                        }
                    }
                }
            }
            return false;
        }

        function updateStatus() {
            if (turn === TEAM_CHO) {
                turnText.textContent = "초(楚) - 초록색";
                turnText.style.color = "#008d62";
            } else {
                turnText.textContent = "한(漢) - 빨강색";
                turnText.style.color = "#d32f2f";
            }
        }

        function resetGame() {
            initBoard();
        }

        // --- 5.5 애니메이션 ---
        function animateMove(startR, startC, endR, endC, onComplete) {
            isAnimating = true;
            const piece = board[startR][startC];
            const startX = MARGIN_X + startC * CELL_W;
            const startY = MARGIN_Y + startR * CELL_H;
            const endX = MARGIN_X + endC * CELL_W;
            const endY = MARGIN_Y + endR * CELL_H;

            // 보드에서 출발지 기물 임시 제거 (이동 중인 모습은 별도로 그리기 위함)
            board[startR][startC] = null;

            const startTime = performance.now();
            const duration = 250; // ms

            function loop(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Ease Out Cubic
                const ease = 1 - Math.pow(1 - progress, 3);

                const curX = startX + (endX - startX) * ease;
                const curY = startY + (endY - startY) * ease;

                drawBoard(); // 배경 및 정지된 기물 그리기

                // 이동 중인 기물 그리기
                drawPiece(0, 0, piece, curX, curY);

                if (progress < 1) {
                    requestAnimationFrame(loop);
                } else {
                    isAnimating = false;
                    // 도착지 업데이트
                    board[endR][endC] = piece;
                    if (onComplete) onComplete();
                    drawBoard(); // 최종 상태 그리기
                }
            }
            requestAnimationFrame(loop);
        }

        // --- 6. 이벤트 핸들러 ---

        canvas.addEventListener('click', (e) => {
            if (gameOver || isAnimating) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - MARGIN_X + CELL_W / 2;
            const y = e.clientY - rect.top - MARGIN_Y + CELL_H / 2;
            const c = Math.floor(x / CELL_W);
            const r = Math.floor(y / CELL_H);

            if (!isInBoard(r, c)) return;

            // 내 기물 선택
            if (board[r][c] && board[r][c].team === turn) {
                selectedPiece = { r, c };
                validMoves = getValidMoves(r, c, board[r][c]);
                drawBoard();
                return;
            }

            // 이동 시도
            if (selectedPiece) {
                const move = validMoves.find(m => m.r === r && m.c === c);
                if (move) {
                    const target = board[r][c];
                    const startR = selectedPiece.r;
                    const startC = selectedPiece.c;

                    // 선택 및 힌트 초기화
                    selectedPiece = null;
                    validMoves = [];

                    // 애니메이션 실행
                    animateMove(startR, startC, r, c, () => {
                        // 왕 잡음 -> 게임 종료
                        if (target && target.type === PIECES.JANG) {
                            setTimeout(() => {
                                alert((turn === TEAM_CHO ? "초(楚)" : "한(漢)") + " 승리!");
                                gameOver = true;
                            }, 10);
                            return;
                        }

                        // 턴 넘기기
                        turn = (turn === TEAM_CHO) ? TEAM_HAN : TEAM_CHO;
                        updateStatus();

                        // 장군 체크
                        if (isCheck(turn)) {
                            setTimeout(() => alert("장군!!"), 50);
                        }
                    });

                } else {
                    // 잘못된 위치 클릭 -> 선택 해제
                    selectedPiece = null;
                    validMoves = [];
                    drawBoard();
                }
            }
        });

        // 시작
        initBoard();

    </script>
</body>
