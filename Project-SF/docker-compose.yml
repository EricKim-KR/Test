version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mosquitto
    restart: always
    ports:
      - "11883:1883" # MQTT
      - "9001:9001" # Websockets
    volumes:
      - ./infra/mosquitto/config:/mosquitto/config
      - ./infra/mosquitto/data:/mosquitto/data
      - ./infra/mosquitto/log:/mosquitto/log

  influxdb:
    image: influxdb:2
    container_name: iot_influxdb
    restart: always
    ports:
      - "18086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=my-org
      - DOCKER_INFLUXDB_INIT_BUCKET=iot_data
    volumes:
      - ./infra/influxdb/data:/var/lib/influxdb2
      - ./infra/influxdb/config:/etc/influxdb2
